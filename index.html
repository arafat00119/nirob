<title>Welcome To My World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("BG.jpg") center center/cover no-repeat;
overflow:hidden;
position:relative;
}

/* Dark Overlay */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0, 0, 0, 0.082);
}

/* Character */

.character{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:350px;
z-index:2;
pointer-events:none;
}

/* Card */

.card{
    position:absolute;
    left:80px;
    top:50%;
    transform:translateY(-50%);

    width:420px;
    padding:35px;
    text-align:center;

    background:rgba(0, 0, 0, 38);
    backdrop-filter:blur(18px);

    border: radius 35px;
    border:1px solid rgba(226, 223, 52, 0.726);

    box-shadow:0 0 30px rgba(0,0,0,.5);
    z-index:5;
   
}



.profile{

width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:3px solid rgb(226, 223, 52, 0.726);
margin-top:-100px;
margin-bottom:20px;

}

h1{

color:rgb(8, 206, 255);
font-size:40px;
font-weight:700;
line-height:1.2;

}

p{

color:#ffffff;
margin:15px 0 30px;

}

.btn{

display:block;

text-decoration:none;

padding:15px;

margin:15px 0;

border-radius:12px;

font-weight:600;

transition:.3s;

}

.fb{

background:#367cd8;
color:white;

}

.tt{

background:#111;
color:white;
border:none

}
.dc{

    background: #367cd8;
    color: #ffffff;
    border: none;

}


.git{

background:#24292f;
color:white;

}

.btn:hover{

transform:translateY(-5px);

box-shadow:0 0 45px rgba(255,255,255,.3);

}

.footer{

margin-top:30px;

font-size:13px;

color:#bbb;

}

</style>
</head>
